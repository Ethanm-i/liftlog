services:
  - type: web
    name: liftlog-elevator
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
